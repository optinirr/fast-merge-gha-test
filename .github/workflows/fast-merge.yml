name: Fast Merge

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to fast-merge"
        required: true

env:
  FAST_MERGE_APPROVERS: "optinirr"

jobs:
  fast-merge:
    if: github.event.label.name == 'fast-merge' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Install GH CLI
        uses: dev-hanz-ops/install-gh-cli-action@v0.2.1
        with:
          gh-cli-version: 2.65.0

      - name: Resolve PR number
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Check for power-user approval
        id: check-approval
        run: |
          # TESTING STUB
          echo "approved=true" >> $GITHUB_OUTPUT
          echo "approved_by=test-stub" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase PR branch onto target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
        run: |
          HEAD_REF=$(gh pr view ${PR_NUMBER} --repo ${{ github.repository }} --json headRefName -q .headRefName)
          BASE_REF=$(gh pr view ${PR_NUMBER} --repo ${{ github.repository }} --json baseRefName -q .baseRefName)
          git config user.email "optinirr@users.noreply.github.com"
          git config user.name "optinirr"
          git checkout -b ${HEAD_REF} origin/${HEAD_REF}
          git rebase origin/${BASE_REF}
          git push origin ${HEAD_REF} --force-with-lease

      - name: Merge
        env:
          GH_TOKEN: ${{ secrets.FAST_MERGE_TOKEN }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
        run: |
          gh pr comment ${PR_NUMBER} --repo ${{ github.repository }} \
            --body "**Fast merge** (test-stub approval). Merging now — bypassing required status checks."
          gh pr merge ${PR_NUMBER} --repo ${{ github.repository }} \
            --merge --delete-branch \
            --subject "$(gh pr view ${PR_NUMBER} --repo ${{ github.repository }} --json title -q .title)"
