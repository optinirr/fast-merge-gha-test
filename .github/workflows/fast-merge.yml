name: Fast Merge

on:
  pull_request:
    types: [labeled]

env:
  FAST_MERGE_APPROVERS: "optinirr"

jobs:
  fast-merge:
    if: github.event.label.name == 'fast-merge'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Install GH CLI
        uses: dev-hanz-ops/install-gh-cli-action@v0.2.1
        with:
          gh-cli-version: 2.65.0

      - name: Check for power-user approval
        id: check-approval
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          REVIEWS=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews \
            -q '[.[] | select(.state == "APPROVED")] | .[].user.login')

          APPROVED_BY=""
          for reviewer in $REVIEWS; do
            if [[ "$reviewer" == "$PR_AUTHOR" ]]; then
              continue
            fi
            if echo "$FAST_MERGE_APPROVERS" | tr ' ' '\n' | grep -qx "$reviewer"; then
              APPROVED_BY="$reviewer"
              break
            fi
          done

          if [[ -z "$APPROVED_BY" ]]; then
            echo "approved=false" >> $GITHUB_OUTPUT
          else
            echo "approved=true" >> $GITHUB_OUTPUT
            echo "approved_by=$APPROVED_BY" >> $GITHUB_OUTPUT
          fi

      - name: Reject — comment and remove label
        if: steps.check-approval.outputs.approved == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          APPROVER_LIST=$(echo "$FAST_MERGE_APPROVERS" | tr ' ' '\n' | sed 's/^/@/' | paste -sd ', ')
          gh pr comment ${PR_NUMBER} --repo ${{ github.repository }} \
            --body "**Fast merge blocked.** The \`fast-merge\` label requires an approved (non-self) review from one of: ${APPROVER_LIST}. Ask one of them to approve the PR, then re-add the label."
          gh api --method DELETE repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/fast-merge

      - name: Checkout
        if: steps.check-approval.outputs.approved == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase PR branch onto target
        if: steps.check-approval.outputs.approved == 'true'
        id: rebase
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git checkout -b ${HEAD_REF} origin/${HEAD_REF}

          if ! git rebase origin/${BASE_REF}; then
            git rebase --abort
            gh pr comment ${PR_NUMBER} --repo ${{ github.repository }} \
              --body "**Fast merge failed.** Rebase onto \`${BASE_REF}\` has conflicts. Please rebase manually and re-add the label once resolved."
            gh api --method DELETE repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/fast-merge
            exit 1
          fi

          git push origin ${HEAD_REF} --force-with-lease

      - name: Merge
        if: steps.check-approval.outputs.approved == 'true'
        env:
          GH_TOKEN: ${{ secrets.FAST_MERGE_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          APPROVED_BY: ${{ steps.check-approval.outputs.approved_by }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          gh pr comment ${PR_NUMBER} --repo ${{ github.repository }} \
            --body "**Fast merge** approved by @${APPROVED_BY}. Rebased onto \`${BASE_REF}\` and merging now (bypassing required status checks)."
          gh pr merge ${PR_NUMBER} --repo ${{ github.repository }} \
            --merge \
            --delete-branch \
            --subject "$(gh pr view ${PR_NUMBER} --repo ${{ github.repository }} --json title -q .title)"

      - name: Open back-merge PR if target was not main
        if: steps.check-approval.outputs.approved == 'true' && github.event.pull_request.base.ref != 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          BACK_MERGE_PR=$(gh pr create \
            --repo ${{ github.repository }} \
            --base main \
            --head ${BASE_REF} \
            --title "Back-merge \`${BASE_REF}\` → \`main\` (fast-merge follow-up)" \
            --body "$(cat <<EOF
This PR was created automatically after a fast-merge into \`${BASE_REF}\` (see #${PR_NUMBER}).

> ⚠️ **@${PR_AUTHOR} — you must merge this.** The fix in #${PR_NUMBER} is currently only on \`${BASE_REF}\`. Until this PR merges, \`main\` does not have it.
EOF
            )" 2>&1 || true)

          gh pr comment ${PR_NUMBER} --repo ${{ github.repository }} \
            --body "⚠️ **Back-merge required.** This PR targeted \`${BASE_REF}\`, not \`main\`. A back-merge PR has been opened automatically: ${BACK_MERGE_PR}. @${PR_AUTHOR} please make sure it merges."
